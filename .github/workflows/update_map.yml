name: Update Exchange Map
on:
  schedule:
    # 매주 월요일 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Generate Exchange Map
        run: python generate_exchange_map.py
        timeout-minutes: 10
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exchange_map.json
          git diff --staged --quiet || git commit -m "🗺️ 거래소 매핑 업데이트 $(date -u '+%Y-%m-%d')"
          git pull origin main --no-rebase -X theirs
          git push
