name: Update Premium Data
on:
  schedule:
    # 6시간 간격 (UTC 00, 06, 12, 18시 = KST 09, 15, 21, 03시)
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch Premium Data
        run: python fetch_premium.py
        timeout-minutes: 5
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 프리미엄 스냅샷 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull origin main --no-rebase -X theirs
          git push
